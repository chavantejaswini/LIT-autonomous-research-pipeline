        (Addendum)\"},\"secondaryIdInfos\":[{\"id\":\"5P30AG044271-07\",\"type\":\"NIH\",\"link\":\"https://reporter.nih.gov/quickSearch/5P30AG044271-07\"}],\"organization\":{\"fullName\":\"The
        University of Texas Health Science Center at San Antonio\",\"class\":\"OTHER\"},\"briefTitle\":\"Effect
        of mTOR Inhibition & Other Metabolism Modulating Interventions on the Elderly
        [SubStudy Rapa & cMRI to Evaluate Cardiac Function]\",\"officialTitle\":\"Effect
        of mTOR Inhibition and Other Metabolism Modulating Interventions on the Elderly:
        Immune, Cognitive, and Functional Consequences ((Substudy E - RAPA cMRI With
        LGE)\",\"acronym\":\"mTOR\"},\"statusModule\":{\"statusVerifiedDate\":\"2025-10\",\"overallStatus\":\"COMPLETED\",\"expandedAccessInfo\":{\"hasExpandedAccess\":false},\"startDateStruct\":{\"date\":\"2022-02-01\",\"type\":\"ACTUAL\"},\"primaryCompletionDateStruct\":{\"date\":\"2025-09-09\",\"type\":\"ACTUAL\"},\"completionDateStruct\":{\"date\":\"2025-09-09\",\"type\":\"ACTUAL\"},\"studyFirstSubmitDate\":\"2021-02-01\",\"studyFirstSubmitQcDate\":\"2021-02-03\",\"studyFirstPostDateStruct\":{\"date\":\"2021-02-08\",\"type\":\"ACTUAL\"},\"lastUpdateSubmitDate\":\"2025-10-06\",\"lastUpdatePostDateStruct\":{\"date\":\"2025-10-08\",\"type\":\"ACTUAL\"}},\"sponsorCollaboratorsModule\":{\"responsibleParty\":{\"type\":\"SPONSOR\"},\"leadSponsor\":{\"name\":\"The
        University of Texas Health Science Center at San Antonio\",\"class\":\"OTHER\"},\"collaborators\":[{\"name\":\"The
        Claude D. Pepper Older Americans Independence Centers\",\"class\":\"OTHER\"},{\"name\":\"National
        Institute on Aging (NIA)\",\"class\":\"NIH\"}]},\"oversightModule\":{\"oversightHasDmc\":true,\"isFdaRegulatedDrug\":true,\"isFdaRegulatedDevice\":false,\"isUsExport\":true},\"descriptionModule\":{\"briefSummary\":\"The
        ability to mount an effective immune response declines with age, leaving the
        elderly increasingly susceptible to infectious diseases and cancer. Rapamycin,
        an FDA approved drug to prevent transplant rejection, increases the lifespan
        and healthspan of mice and ameliorates age-related declines in immune responsiveness,
        cancer survival, and cognition in laboratory animals. Investigators are conducting
        a translational trial to test whether rapamycin also improves life functions
        in humans focusing on elderly persons (aged 70-95).\\n\\nSubstudy E will evaluate
        the Rapamycin and Cardiac Function.\",\"detailedDescription\":\"The main study
        has completed and results are reported (NCT02874924)\\n\\nPurpose of Sub-study
        E - Rapamycin and cMRI to evaluate cardiac function:\\n\\nThe over-arching
        hypothesis is that RAPA treatment will effect simultaneous improvement in
        parameters known to be negatively impacted by aging. For example, systemic
        inflammation is higher in older individuals and contributes to the development
        of age-related pathologies affecting both the heart and the vasculature. In
        particular, evidence indicates that aging-associated alterations in inflammatory
        and pro-fibrotic pathways are critically involved in the etiology of age-related
        declines. The study team hypothesize that mTOR antagonism with RAPA will improve
        detrimental age-related pathologies affecting the heart in elderly humans.\"},\"conditionsModule\":{\"conditions\":[\"Aging\"],\"keywords\":[\"geriatrics\"]},\"designModule\":{\"studyType\":\"INTERVENTIONAL\",\"phases\":[\"PHASE2\"],\"designInfo\":{\"allocation\":\"NA\",\"interventionModel\":\"SINGLE_GROUP\",\"interventionModelDescription\":\"Rapamycin
        1mg for 8 weeks\",\"primaryPurpose\":\"BASIC_SCIENCE\",\"maskingInfo\":{\"masking\":\"NONE\"}},\"enrollmentInfo\":{\"count\":20,\"type\":\"ACTUAL\"}},\"armsInterventionsModule\":{\"armGroups\":[{\"label\":\"Rapamycin\",\"type\":\"EXPERIMENTAL\",\"description\":\"Rapamycin
        1mg for 8 weeks\",\"interventionNames\":[\"Drug: rapamycin\"]}],\"interventions\":[{\"type\":\"DRUG\",\"name\":\"rapamycin\",\"description\":\"Taken
        orally 1mg daily for 8 weeks\",\"armGroupLabels\":[\"Rapamycin\"],\"otherNames\":[\"Sirolimus\"]}]},\"outcomesModule\":{\"primaryOutcomes\":[{\"measure\":\"Systolic
        Function\",\"description\":\"Test whether RAPA improves systolic function
        in elderly subjects. Cardiac MRI will be measured before and after 8 weeks
        of RAPA administration using 3T MRI. From collected MRI data, the study team
        will quantify change in systolic volumes.\",\"timeFrame\":\"Baseline to 8
        weeks\"},{\"measure\":\"Diastolic Function\",\"description\":\"Test whether
        RAPA improves diastolic function in elderly subjects.Cardiac MRI will be measured
        before and after 8 weeks of RAPA administration using 3T MRI. From collected
        MRI data, the study team will quantify change in diastolic volumes.\",\"timeFrame\":\"Baseline
        to 8 weeks\"},{\"measure\":\"Aortic Cross-Sectional Area\",\"description\":\"Test
        whether RAPA increases aortic compliance in elderly subjects. Aortic MRI will
        be measured before and after 8 weeks of RAPA using 3T MRI. The study team
        will quantify distal descending aortic cross-sectional area to assess aortic
        function/compliance effects.\",\"timeFrame\":\"Baseline to 8 weeks\"},{\"measure\":\"Aortic
        Distensibility\",\"description\":\"Test whether RAPA increases aortic compliance
        in elderly subjects. Aortic MRI will be measured before and after 8 weeks
        of RAPA using 3T MRI. The study team will quantify change in distal descending
        aortic distensibility to assess aortic function/compliance effects.\",\"timeFrame\":\"Baseline
        to 8 weeks\"}]},\"eligibilityModule\":{\"eligibilityCriteria\":\"Inclusion
        Criteria:\\n\\n* men and women 70-95 years of age.\\n* Subjects will be in
        good general health with all chronic diseases (hypertension, coronary artery
        disease, etc.) clinically stable. Selected subjects will be in good health
        (Per the World Health Organization good health will be defined as complete
        physical, mental, and social well-being and not merely the absence of disease
        or infirmity.\\n* For our purposes all diseases or infirmities will be clinically
        stable whether managed by medications or not.\\n* All ethnicities will be
        included.\\n* For cardiac and brain imaging by MRI, a pre-MRI screening questionnaire
        will be used to assess MRI safety and neurological health.\\n\\nExclusion
        Criteria:\\n\\n* Diabetes, (with A1c \u22656.5 or if treated with medication
        affecting glucose homeostasis History of skin ulcers or poor wound healing,\\n*
        Smoking,\\n* Liver disease,\\n* Anti-coagulation,\\n* Treatment with drugs
        known to affect cytochrome P450 3A (diltiazem, erythromycin, etc) due to its
        role in RAPA metabolism,\\n* Treatment (\\\\>30days of therapy or long term)
        with a systemic immunosuppressant (prednisone, etc.) within the last year,\\n*
        History of recent (within 6 months) Myocardial Infarction or active Coronary
        Disease,\\n* Patients with history of recent (within 6 months) intestinal
        disorders,\\n* Exclusion criteria for MRI scan: known claustrophobia, metal
        implants in soft tissue of the body including pacemakers, aneurysm clips,
        ferrous metal fragments not anchored to bone (bullets, BBs, shrapnel, metal
        shavings), implanted medication pumps, and oral-facial metal appliances that
        are permanently secured but may result in low image quality. Participants
        may also be excluded for history of severe head trauma, brain injury, brain
        surgery, inflammation of the brain, or history of seizures.\\n* Positive COVID19
        test.\",\"healthyVolunteers\":true,\"sex\":\"ALL\",\"minimumAge\":\"70 Years\",\"maximumAge\":\"95
        Years\",\"stdAges\":[\"OLDER_ADULT\"]},\"contactsLocationsModule\":{\"overallOfficials\":[{\"name\":\"Dean
        L Kellogg, Jr., MD PhD\",\"affiliation\":\"The University of Texas Health
        Science Center at San Antonio\",\"role\":\"PRINCIPAL_INVESTIGATOR\"}],\"locations\":[{\"facility\":\"Audie
