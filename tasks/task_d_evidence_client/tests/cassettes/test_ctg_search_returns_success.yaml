  response:
    body:
      string: "{\"studies\":[\n{\"protocolSection\":{\"identificationModule\":{\"nctId\":\"NCT07475546\",\"orgStudyIdInfo\":{\"id\":\"ALRx011\"},\"organization\":{\"fullName\":\"AgelessRx\",\"class\":\"INDUSTRY\"},\"briefTitle\":\"Combination
        Gerotherapeutic Interventions for Healthspan Improvement\",\"officialTitle\":\"A
        Pilot Randomized Controlled Study of Combinatorial Gerotherapeutics for Healthspan
        Improvement\"},\"statusModule\":{\"statusVerifiedDate\":\"2026-03\",\"overallStatus\":\"ACTIVE_NOT_RECRUITING\",\"expandedAccessInfo\":{\"hasExpandedAccess\":false},\"startDateStruct\":{\"date\":\"2025-07-23\",\"type\":\"ACTUAL\"},\"primaryCompletionDateStruct\":{\"date\":\"2026-04\",\"type\":\"ESTIMATED\"},\"completionDateStruct\":{\"date\":\"2026-04\",\"type\":\"ESTIMATED\"},\"studyFirstSubmitDate\":\"2026-02-02\",\"studyFirstSubmitQcDate\":\"2026-03-11\",\"studyFirstPostDateStruct\":{\"date\":\"2026-03-16\",\"type\":\"ACTUAL\"},\"lastUpdateSubmitDate\":\"2026-03-11\",\"lastUpdatePostDateStruct\":{\"date\":\"2026-03-16\",\"type\":\"ACTUAL\"}},\"sponsorCollaboratorsModule\":{\"responsibleParty\":{\"type\":\"SPONSOR\"},\"leadSponsor\":{\"name\":\"AgelessRx\",\"class\":\"INDUSTRY\"}},\"oversightModule\":{\"oversightHasDmc\":false,\"isFdaRegulatedDrug\":true,\"isFdaRegulatedDevice\":false,\"isUsExport\":false},\"descriptionModule\":{\"briefSummary\":\"This
        study is a 90-day interventional, randomized, controlled pilot trial exploring
        multi-modal gerotherapies and their impact on longevity-related outcomes.
        In this proof-of-concept phase, a small sample size of up to 30 subjects (10
        subjects in each arm) will be randomized into one of the three arms: 1) Control,
        2) Multi-therapy (B12, Naltrexone, Metformin, and NAD+), or 4) Comprehensive
        Therapy (Rapamycin, Naltrexone, Metformin, B12, NAD+, GSH, and Infinite Supplement).\",\"detailedDescription\":\"The
        two main study objectives are 1) To evaluate the impact of different combinations
        of gerotherapeutics on measures of muscle, cognitive, and immune function,
        \\\\& 2) To assess the impact of the combinatorial gerotherapeutics on sleep
        measures, perceived quality of life, and longevity biomarkers. Potential subjects
        will be recruited utilizing email and social media-based methods. They will
        be screened for eligibility and enrolled in the study upon obtaining informed
        consent. All groups will complete DEXA scans, V02 Max tests, Creyos cognitive
        assessments, Edifice Health's iAge tests, iollo at-home blood testing kits,
        routine blood-work, and the following standardized survey questionnaires:
        ISQ (Immune Status Questionnaire), SF-36 (Quality of Life), RAPA (Rapid Assessment
        of Physical Activity), and SQS (Sleep Quality Survey). Subjects will set up
        Oura data-tracking for health biometric data with study staff assistance.
        Intervention group participants will also receive a guided meditation program
        and structured exercise program to follow throughout the study. In contrast,
        participants in the control group will engage in a standard exercise regimen
        (150 minutes per week) and listen to a neutral podcast designed to control
        for time and attention.\\n\\nParticipants will be evaluated at baseline and
        study end for measures of muscle function (by DEXA scan of muscle mass and
        the VO2 max test to measure endurance capacity using a formal test and/or
        Oura ring estimate), cognitive function (by Creyos cognitive tests via web
        browser), immune function (by iAge and CD4+ : CD8+ ratio/lymphocyte : neutrophil
        ratio with Immune Status Questionnaire (ISQ) supplementation), SF-36 Quality
        of Life (SF-36 QoL) survey scores, PhenoAge (from blood biomarkers obtained
        from routine safety labs, detailed below), activity levels (RAPA questionnaire,
        Oura ring), metabolic health measures from routine and at-home blood tests,
        sleep improvements evaluated through Oura wearable device sleep quality and
        quantity as well as the Sleep Quality Survey (SQS), as well as other health
        indicators from Oura wearable data between baseline and study end. To ensure
        robustness of outcome measures, two measurements of each item 1 week apart
        will be used at baseline and again at study end for all measures except for
        DEXA scan, V02 max formal test and Oura ring estimate, iAge and iollo kits,
        which will be used once at the beginning and once at the end of the study.\"},\"conditionsModule\":{\"conditions\":[\"Healthspan
        Improvement\",\"Aging\",\"Longevity\"],\"keywords\":[\"Gerotherapeutics\",\"Rapamycin\",\"Naltrexone\",\"Metformin\",\"NAD+\",\"GSH\",\"B12\"]},\"designModule\":{\"studyType\":\"INTERVENTIONAL\",\"phases\":[\"PHASE3\"],\"designInfo\":{\"allocation\":\"RANDOMIZED\",\"interventionModel\":\"PARALLEL\",\"primaryPurpose\":\"TREATMENT\",\"maskingInfo\":{\"masking\":\"NONE\"}},\"enrollmentInfo\":{\"count\":30,\"type\":\"ESTIMATED\"}},\"armsInterventionsModule\":{\"armGroups\":[{\"label\":\"Multi-Therapy:
        NAD+, LDN, B12, and metformin\",\"type\":\"EXPERIMENTAL\",\"description\":\"In
        intervention month one, participants naive to all medications will be titrated
        on to low maintenance doses of each. NAD+ will be taken as a nasal spray of
        30mg/day; LDN, will start at 1.5mg once daily and titrate up each week to
        4.5mg daily; B12, take 1 cap per day (100mcg); Metformin will be taken 500mg
        daily. They will then remain on the maintenance doses of the combination therapy
        for the next 60 days.\",\"interventionNames\":[\"Drug: Naltrexone\",\"Drug:
        Metformin\",\"Drug: NAD+\",\"Dietary Supplement: B12\",\"Behavioral: Intervention:
        Guided Meditation Program\",\"Behavioral: Intervention: Structured Exercise
        Program\"]},{\"label\":\"Comprehensive Therapy: LDR, LDN, B12, metformin,
        NAD+, GSH, and Infinite\",\"type\":\"EXPERIMENTAL\",\"description\":\"In intervention
        month one, participants naive to all medications will be titrated on to low
        maintenance doses of each. LDR will start at 2mg once per week and titrate
        up weekly to 6mg once per week; LDN, will start at 1.5mg once daily and titrate
        up each week to 4.5mg daily; B12, take 1 cap per day (100mcg); Metformin will
        be taken 500mg daily; NAD+ will be taken as a nasal spray of 30mg/day; GSH
        will be taken as a topical patch for 4 hrs, once per week; Infinite supplement
        will be taken once daily. They will then remain on the maintenance doses of
        the combination therapy for the next 60 days.\",\"interventionNames\":[\"Drug:
        Rapamycin\",\"Drug: Naltrexone\",\"Drug: Metformin\",\"Drug: NAD+\",\"Drug:
        GSH\",\"Dietary Supplement: Infinite Supplement\",\"Dietary Supplement: B12\",\"Behavioral:
        Intervention: Guided Meditation Program\",\"Behavioral: Intervention: Structured
        Exercise Program\"]},{\"label\":\"Placebo\",\"type\":\"PLACEBO_COMPARATOR\",\"description\":\"In
        the control cohort, participants will take Vitamin C (1x/day) and Vitamin
        E (1x/week) as placebo agents.\",\"interventionNames\":[\"Drug: Placebo/control\",\"Behavioral:
        Control: Podcast Listening Activity\",\"Behavioral: Control: Standard Exercise
        Regimen\"]}],\"interventions\":[{\"type\":\"DRUG\",\"name\":\"Rapamycin\",\"description\":\"In
        the comprehensive therapy group, participants will start LDR at 2mg once per
        week and titrate up weekly to 6mg once per week.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\"],\"otherNames\":[\"sirolimus\",\"low-dose
        rapamycin (LDR)\"]},{\"type\":\"DRUG\",\"name\":\"Naltrexone\",\"description\":\"In
        both intervention groups, participants will start LDN at 1.5mg once daily
        and titrate up each week to 4.5mg daily.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\",\"Multi-Therapy:
        NAD+, LDN, B12, and metformin\"],\"otherNames\":[\"low-dose naltrexone (LDN)\"]},{\"type\":\"DRUG\",\"name\":\"Metformin\",\"description\":\"In
        both intervention groups, participants will take Metformin at 500mg daily.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\",\"Multi-Therapy:
        NAD+, LDN, B12, and metformin\"]},{\"type\":\"DRUG\",\"name\":\"NAD+\",\"description\":\"In
        both intervention groups, NAD+ will be taken as a nasal spray of 30mg/day.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\",\"Multi-Therapy:
        NAD+, LDN, B12, and metformin\"],\"otherNames\":[\"nicotinamide adenine dinucleotide
        (NAD+)\"]},{\"type\":\"DRUG\",\"name\":\"GSH\",\"description\":\"In the comprehensive
        therapy group, GSH will be taken as a topical patch for 4 hrs, once per week.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\"],\"otherNames\":[\"Glutathione\"]},{\"type\":\"DIETARY_SUPPLEMENT\",\"name\":\"Infinite
        Supplement\",\"description\":\"Participants in the comprehensive therapy group
        will take the Infinite supplement once daily. The Infinite supplement is a
        proprietary blend of seven putative geroprotective compounds implicated in
        enhancing cellular function critical for managing cellular damage accumulation
        prevention of age-related decline (including Alpha ketoglutarate, Quercetin,
        Glucosamine, Carnosine, Pterostilbene, Astaxanthin, and Curcumin)\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\"]},{\"type\":\"DRUG\",\"name\":\"Placebo/control\",\"description\":\"In
        the control cohort, participants will take Vitamin C (1x/day) and Vitamin
        E (1x/week) as placebo agents.\",\"armGroupLabels\":[\"Placebo\"]},{\"type\":\"DIETARY_SUPPLEMENT\",\"name\":\"B12\",\"description\":\"In
        both intervention groups, participants will take vitamin B12 once daily.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\",\"Multi-Therapy:
        NAD+, LDN, B12, and metformin\"],\"otherNames\":[\"Methylcobalamin\"]},{\"type\":\"BEHAVIORAL\",\"name\":\"Intervention:
        Guided Meditation Program\",\"description\":\"Intervention group participants
        will follow a daily, app-based meditation program for 20 minutes a day.\",\"armGroupLabels\":[\"Comprehensive
        Therapy: LDR, LDN, B12, metformin, NAD+, GSH, and Infinite\",\"Multi-Therapy:
        NAD+, LDN, B12, and metformin\"]},{\"type\":\"BEHAVIORAL\",\"name\":\"Control:
        Podcast Listening Activity\",\"description\":\"Control participants will listen
        to a neutral podcast for 20 minutes a day designed to control for time and
        attention.\",\"armGroupLabels\":[\"Placebo\"]},{\"type\":\"BEHAVIORAL\",\"name\":\"Control:
        Standard Exercise Regimen\",\"description\":\"Control group participants will
        engage in a standard exercise regimen (150 minutes of aerobic activity such
        as walking per week).\",\"armGroupLabels\":[\"Placebo\"]},{\"type\":\"BEHAVIORAL\",\"name\":\"Intervention:
        Structured Exercise Program\",\"description\":\"Intervention group participants
        will follow a structured daily exercise program including resistance training
        and a recommendation for 150 minutes of aerobic activity (e.g., walking) per
        week.\",\"armGroupLabels\":[\"Comprehensive Therapy: LDR, LDN, B12, metformin,
        NAD+, GSH, and Infinite\",\"Multi-Therapy: NAD+, LDN, B12, and metformin\"]}]},\"outcomesModule\":{\"primaryOutcomes\":[{\"measure\":\"Change
        in cardiorespiratory fitness measured by maximal oxygen uptake (VO\u2082 max)\",\"description\":\"Maximal
        oxygen uptake (VO\u2082 max) will be assessed using standardized cardiopulmonary
        exercise testing. This assessment will be conducted once at baseline and once
        at the 3-month follow-up. The outcome will be the change in VO\u2082 max from
        baseline to 3 months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        in cognitive performance measured by Creyos Cognitive Test composite score\",\"description\":\"Cognitive
        performance will be assessed using the Creyos online cognitive assessment
        platform. Assessments will be conducted twice at baseline and twice during
        the final study period, with measurements occurring at least 7 days apart.
        Scores from the two assessments at each timepoint will be averaged to determine
        the baseline and endpoint values. The outcome will be the change in the overall
        composite cognitive performance score from baseline to 3 months.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change in systemic chronic inflammation measured
        by iAge index score\",\"description\":\"Immune function will be assessed via
        systemic chronic inflammation using the iAge Index Score derived from blood
        biomarkers. This assessment will be conducted once at baseline and once at
        the 3-month follow-up. The outcome will be the change in iAge index score
        from baseline to 3 months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        in lean body mass measured by dual-energy X-ray absorptiometry (DEXA)\",\"description\":\"Lean
        body mass will be assessed using dual-energy X-ray absorptiometry (DEXA).
        This assessment will be conducted once at baseline and once at the 3-month
        follow-up. The outcome will be the change in total lean body mass from baseline
        to 3 months.\",\"timeFrame\":\"3 months\"}],\"secondaryOutcomes\":[{\"measure\":\"Change
        in total sleep time measured using Oura wearable device\",\"description\":\"Total
        sleep time will be assessed using sleep data collected from the Oura Ring
        wearable device. Total sleep time represents the total duration of sleep obtained
        during the primary sleep period each night. Total sleep time will be measured
        twice at baseline and twice during the final study period, with measurements
        occurring at least 7 days apart. Values from each assessment period will be
        averaged to determine the baseline and 3-month outcome values. The outcome
        will be the change in average nightly total sleep time from baseline to 3
        months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change in health-related
        quality of life measured by the Short Form Health Survey (SF-36)\",\"description\":\"Quality
        of life will be assessed using the 36-Item Short Form Health Survey (SF-36).
        Scores range from 0 to 100, with higher scores indicating better health-related
        quality of life. Assessments will be conducted twice at baseline and twice
        at the 3-month follow-up, with measurements occurring at least 7 days apart.
        Values from the two assessments at each timepoint will be averaged. The outcome
        will be the change in overall SF-36 score from baseline to 3 months.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change in biological age estimated from blood-based
        biomarker panels\",\"description\":\"Biological age will be estimated using
        biomarker panels derived from the iollo home testing kit. his assessment will
        be conducted once at baseline and once at the 3-month follow-up. The outcome
        will be the change in estimated biological age from baseline to 3 months.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change in sleep quality measured by the Sleep Quality
        Scale (SQS)\",\"description\":\"Sleep quality will be assessed using the Sleep
        Quality Scale (SQS), a validated self-report instrument ranging from 0 to
        84, where higher scores indicate worse sleep quality. Assessments will be
        conducted twice at baseline and twice at the 3-month follow-up, with measurements
        occurring at least 7 days apart. Values from the two assessments at each timepoint
        will be averaged. The outcome will be the change in overall sleep score from
        baseline to 3 months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        in physical activity measured by the Rapid Assessment of Physical Activity
        (RAPA) questionnaire\",\"description\":\"Physical activity will be assessed
        using the Rapid Assessment of Physical Activity (RAPA) questionnaire. Scores
        range from 1 to 7, with higher scores indicating greater levels of physical
        activity. Assessments will be conducted twice at baseline and twice at the
        3-month follow-up, with measurements occurring at least 7 days apart. Values
        from the two assessments at each timepoint will be averaged. The outcome will
        be the change in physical activity score from baseline to 3 months.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change in self-reported immune function measured
        by the Immune Status Questionnaire (ISQ)\",\"description\":\"Self-reported
        immune function will be assessed using the Immune Status Questionnaire (ISQ),
        a validated self-report instrument that evaluates the frequency of immune-related
        symptoms (e.g., colds, fever, cough, and other infection-related complaints).
        The ISQ produces a total score ranging from 0 to 10, with higher scores indicating
        better perceived immune functioning. Assessments will be conducted twice at
        baseline and twice at the 3-month follow-up, with measurements occurring at
        least 7 days apart. Values from the two assessments at each timepoint will
        be averaged. The outcome will be the change in ISQ total score from baseline
        to 3 months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change from baseline
        to 3 months in hemoglobin A1c\",\"description\":\"Hemoglobin A1c (HbA1c) will
        be measured from venous blood samples collected during routine laboratory
        testing. HbA1c reflects average blood glucose levels over approximately the
        prior 2-3 months. Blood samples will be collected twice at baseline and twice
        during the final study period with assessments occurring at least 7 days apart.
        Values from each timepoint will be averaged.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        from baseline to 3 months in fasting insulin concentration\",\"description\":\"Fasting
        insulin will be measured from venous blood samples collected during routine
        laboratory testing. Blood samples will be collected twice at baseline and
        twice during the final study period with assessments occurring at least 7
        days apart. Measurements from each timepoint will be averaged.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change from baseline to 3 months in high-sensitivity
        C-reactive protein (hs-CRP)\",\"description\":\"High-sensitivity C-reactive
        protein (hs-CRP) will be measured from venous blood samples as a marker of
        systemic inflammation. Blood samples will be collected twice at baseline and
        twice during the final study period with assessments occurring at least 7
        days apart. Measurements from each timepoint will be averaged.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change from baseline to 3 months in low-density lipoprotein
        cholesterol (LDL-C)\",\"description\":\"Low-density lipoprotein cholesterol
        will be measured from fasting venous blood samples as part of a lipid panel.
        Blood samples will be collected twice at baseline and twice during the final
        study period with assessments occurring at least 7 days apart. Measurements
        from each timepoint will be averaged.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        from baseline to 3 months in high-density lipoprotein cholesterol (HDL-C)\",\"description\":\"High-density
        lipoprotein cholesterol will be measured from fasting venous blood samples
        as part of a lipid panel. Blood samples will be collected twice at baseline
        and twice during the final study period with assessments occurring at least
        7 days apart. Measurements from each timepoint will be averaged.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change from baseline to 3 months in fasting triglyceride
        levels\",\"description\":\"Triglycerides will be measured from fasting venous
        blood samples as part of a lipid panel. Blood samples will be collected twice
        at baseline and twice during the final study period with assessments occurring
        at least 7 days apart. Measurements from each timepoint will be averaged.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change from baseline to 3 months in fasting plasma
        glucose\",\"description\":\"Fasting glucose will be measured from venous blood
        samples collected during routine laboratory testing. Blood samples will be
        collected twice at baseline and twice during the final study period with assessments
        occurring at least 7 days apart. Measurements from each timepoint will be
        averaged.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change from baseline
        to 3 months in creatinine\",\"description\":\"Creatinine will be measured
        from venous blood samples as part of a comprehensive metabolic panel to assess
        kidney function. Blood samples will be collected twice at baseline and twice
        during the final study period with assessments occurring at least 7 days apart.
        Measurements from each timepoint will be averaged.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        from baseline to 3 months in white blood cell count\",\"description\":\"White
        blood cell (WBC) count will be measured from venous blood samples as part
        of a complete blood count panel. Blood samples will be collected twice at
        baseline and twice during the final study period with assessments occurring
        at least 7 days apart. Measurements from each timepoint will be averaged.\",\"timeFrame\":\"3
        months\"}],\"otherOutcomes\":[{\"measure\":\"Change in resting heart rate
        measured using wearable device data\",\"description\":\"Resting heart rate
        (beats per minute) will be measured using wearable device data averaged across
        a two-week period at baseline and at 3 months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        in physical activity measured by metabolic equivalent of task (MET) minutes
        using Oura wearable device data\",\"description\":\"Physical activity will
        be assessed using metabolic equivalent of task (MET) estimates derived from
        wearable device activity data collected by the Oura Ring. MET minutes represent
        the intensity and duration of physical activity performed. MET data will be
        averaged across a two-week period at baseline and at 3 months. The outcome
        will be the change in average daily MET minutes from baseline to 3 months.\",\"timeFrame\":\"3
        months\"},{\"measure\":\"Change in physiological stress score measured using
        Oura wearable device metric\",\"description\":\"Physiological stress will
        be assessed using the wearable device stress score derived from heart rate
        variability metrics. Stress data will be averaged across a two-week period
        at baseline and at 3 months. The outcome will be the change in physiological
        stress score from baseline to 3 months.\",\"timeFrame\":\"3 months\"},{\"measure\":\"Change
        in average daily step count measured using Oura wearable device\",\"description\":\"Physical
        activity will also be assessed using average daily step counts recorded by
        the Oura wearable device. Daily step count data will be averaged across a
        two-week period at baseline and at 3 months. The outcome will be the change
        in average daily step count from baseline to 3 months.\",\"timeFrame\":\"3
        months\"}]},\"eligibilityModule\":{\"eligibilityCriteria\":\"Inclusion Criteria:\\n\\n*
        New, existing, or prospective AgelessRx patient\\n* Adults (60-80 years of
        age)\\n* Any sex\\n* Any ethnicity\\n* Willingness to provide informed consent
        and complete study assessments/procedures\\n* Willingness to attend virtual
        meeting check-ins/follow-ups\\n* Willingness and eligibility to take all medications
        used in this study\\n* Has at-risk indicators for decline on measures of cognitive,
        immune, and muscle function, as indicated by a combination of BMI of 26-30;
        SF36 score below the validated central tendency for 2 of: physical function,
        physical role limitations, energy, pain; final ISQ scores of \\\\<6; individuals
        that report brain fog or difficulty with mental clarity; pre-diabetic, or
        other comorbidities that result in reduced overall health functioning as determined
        by a physician\\n\\nExclusion Criteria:\\n\\n* Pregnant or breastfeeding individuals\\n*
        History of severe adverse reactions to study medications\\n* Significant psychiatric
        illness that may affect participation\\n* Determination of ineligibility for
        a study medication by AgelessRx medical team\\n* Concurrent participation
        in other conflicting clinical trials\",\"healthyVolunteers\":true,\"sex\":\"ALL\",\"minimumAge\":\"60
        Years\",\"maximumAge\":\"80 Years\",\"stdAges\":[\"ADULT\",\"OLDER_ADULT\"]},\"contactsLocationsModule\":{\"overallOfficials\":[{\"name\":\"Jenell
        Decker, MD\",\"affiliation\":\"AgelessRx\",\"role\":\"PRINCIPAL_INVESTIGATOR\"},{\"name\":\"Stefanie
