      string: "{\"protocolSection\":{\"identificationModule\":{\"nctId\":\"NCT04566393\",\"orgStudyIdInfo\":{\"id\":\"ULI-EAP-100\"},\"organization\":{\"fullName\":\"xCures\",\"class\":\"INDUSTRY\"},\"briefTitle\":\"Expanded
        Access to Ulixertinib (BVD-523) in Patients With Advanced MAPK Pathway-Altered
        Malignancies\",\"officialTitle\":\"Expanded Access to Ulixertinib (BVD-523)
        in Patients With Advanced MAPK Pathway-Altered Malignancies\"},\"statusModule\":{\"statusVerifiedDate\":\"2026-01\",\"overallStatus\":\"AVAILABLE\",\"expandedAccessInfo\":{\"hasExpandedAccess\":false},\"studyFirstSubmitDate\":\"2020-09-17\",\"studyFirstSubmitQcDate\":\"2020-09-21\",\"studyFirstPostDateStruct\":{\"date\":\"2020-09-28\",\"type\":\"ACTUAL\"},\"lastUpdateSubmitDate\":\"2026-01-26\",\"lastUpdatePostDateStruct\":{\"date\":\"2026-01-28\",\"type\":\"ACTUAL\"}},\"sponsorCollaboratorsModule\":{\"responsibleParty\":{\"type\":\"SPONSOR\"},\"leadSponsor\":{\"name\":\"xCures\",\"class\":\"INDUSTRY\"},\"collaborators\":[{\"name\":\"Cancer
        Commons\",\"class\":\"OTHER\"}]},\"descriptionModule\":{\"briefSummary\":\"The
        objective of this expanded access program is to provide ulixertinib (BVD-523)
        for compassionate use in advanced cancer patients with MAPK pathway-altered
        solid tumor(s), including but not limited to KRAS, NRAS, HRAS, BRAF, MEK,
        and ERK mutations who have incomplete response to or have exhausted available
        therapies.\\n\\nUlixertinib is available for treatment as monotherapy or in
        combination with other clinically tolerable agent(s), conditionally approved
        by the drug manufacturer.\"},\"conditionsModule\":{\"conditions\":[\"Pancreatic
        Cancer\",\"Small Bowel Cancer\",\"Colorectal Cancer\",\"Melanoma\",\"Non Small
        Cell Lung Cancer\",\"Thyroid Cancer\",\"Bladder Cancer\",\"Head and Neck Cancer\",\"Gastric
        Cancer\",\"Esophageal Cancer\",\"Cholangiocarcinoma\",\"Ovarian Cancer\",\"Hepatocellular
        Carcinoma\",\"Glioblastoma\",\"MAPK Gene Mutation\",\"KRAS Activating Mutation\",\"BRAF
        Gene Mutation\",\"NRAS Gene Mutation\",\"HRAS Gene Mutation\",\"MEK Mutation\",\"ERK
        Mutation\"]},\"designModule\":{\"studyType\":\"EXPANDED_ACCESS\",\"nPtrsToThisExpAccNctId\":1,\"expandedAccessTypes\":{\"intermediate\":true}},\"armsInterventionsModule\":{\"interventions\":[{\"type\":\"DRUG\",\"name\":\"Ulixertinib
        (BVD-523)\",\"description\":\"Ulixertinib (BVD-523) is an oral, first-in-class
        ERK1/2 inhibitor\"}]},\"eligibilityModule\":{\"eligibilityCriteria\":\"Inclusion
        Criteria:\\n\\n* Main Inclusion Criterion:\\n\\n  1\\\\. Patient has a MAPK
        pathway-altered solid tumor(s), including but not limited to KRAS, NRAS, HRAS,
        BRAF, MEK, and ERK mutations.\\n* Other Inclusion Criteria:\\n\\n  1. In the
        opinion of the treating physician, the patient has exhausted or has inadequate
        response to available anti-cancer treatments.\\n  2. In the opinion of the
        treating physician, the patient has adequate organ function to tolerate ulixertinib
        as defined in section 6.1\\n  3. Male or female patients aged \u2265 12 years.\\n
        \ 4. Patient must be able to swallow and retain orally administered medication.\\n\\n
        \    Note: Ulixertinib is primarily absorbed in the duodenum and therefore
        patients with any prior stomach or duodenal resection should be evaluated
        with that understanding.\\n  5. For females, evidence of post-menopausal status
        or negative urinary or serum pregnancy test for pre-menopausal patients.\\n
        \ 6. Highly effective contraception for both male and female patients throughout
        the treatment and for at least 4 months after last treatment administration.
        In patients under the age of 18, who are not sexually active, abstinence is
        an acceptable form.\\n  7. Toxicities related to any prior treatments are
        either stable, stable on supportive therapy, resolved, or in the opinion of
        the treating physician, clinically non-significant\\n  8. Ability to understand
        a written informed consent document, and the willingness to sign it. Assent
        will be obtained when appropriate based on the patient's age.\\n\\nExclusion
        Criteria:\\n\\n1. Patient is already participating in or qualifies for and
        is able to enroll in a clinical trial of ulixertinib (BVD-523).\\n2. Patient
        has received systemic therapy with an investigational agent within 5 half-lives
        or 14 days prior to starting ulixertinib treatment, whichever is shorter.\\n3.
        Patient has received radiotherapy within 14 days prior to the first dose of
        ulixertinib treatment other than for the allowable treatment of symptomatic
        bone metastasis.\\n4. A history of current evidence/risk of retinal vein occlusion
        (RVO) or central serous retinopathy (CSR)\\n5. Current evidence of uncontrolled,
        significant intercurrent illness that would, in the treating physician's judgment,
        contraindicate the patient's treatment with ulixertinib due to safety concerns.\\n6.
        Patients who, in the opinion of the treating physician, have not fully recovered
        from recent major surgery to a sufficient extent to tolerate treatment with
        ulixertinib.\\n7. Known hypersensitivity to ulixertinib or any component in
        its formulation.\\n8. Patients taking prohibited medications as described
        in current Investigator's Brochure.\\n\\n   Note: Patients who require treatment
        with Drugs that are strong inhibitors or inducers of CYP1A2, CYP2D6, and CYP3A4
        (see Appendix 3) were excluded from the FIH study of ulixertinib and should
        be discussed with xCures to review if any potential benefits outweigh the
        potential risks.\\n9. Patient is actively breastfeeding.\\n10. Prior stomach
        or duodenal resection that in the opinion of the treating physician would
        affect the breakdown and absorption of ulixertinib.\",\"sex\":\"ALL\",\"minimumAge\":\"12
